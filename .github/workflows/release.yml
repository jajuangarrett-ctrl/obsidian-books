name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and build release assets
        run: npm run validate

      - name: Verify tag matches manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')).version)")"
          test "${TAG#v}" = "$MANIFEST_VERSION"

      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
